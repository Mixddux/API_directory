name: Sync APIs Daily

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Fetch latest API data
        run: node --experimental-strip-types scripts/fetch-apis.ts

      - name: Check for data changes
        id: diff
        run: |
          if git diff --quiet src/data/apis-cache.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No changes detected in API data."
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "APIs changed. Triggering rebuild."
          fi

      - name: Commit and push updated cache
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add src/data/apis-cache.json
          git commit -m "chore(data): sync APIs from public-apis/public-apis [$(date -u +%Y-%m-%d)]"
          git push
