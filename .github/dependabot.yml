version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
    groups:
      astro-and-integrations:
        patterns:
          - "astro"
          - "@astrojs/*"
          - "@playform/*"
      tailwind:
        patterns:
          - "tailwindcss"
          - "@tailwindcss/*"
      dev-tools:
        patterns:
          - "typescript"
          - "eslint*"
          - "@typescript-eslint/*"
          - "prettier*"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "automated"
